services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NEO4J_URI=bolt://db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; import sys;\nresp=urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health'); sys.exit(0 if resp.status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
